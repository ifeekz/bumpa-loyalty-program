server {
    listen 80;
    server_name localhost;

    # Document root points to Laravel's public/ directory
    root /var/www/public;
    index index.php index.html;

    # Request handling
    location / {
        # Try serving the file directly, then directory, then fall back to
        # Laravel's front controller (index.php) for all SPA/API routing.
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM passthrough
    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        # Increase timeouts for long-running requests (e.g. payment callbacks)
        fastcgi_read_timeout 300;
    }

    # Security: block access to hidden files (.env, .git, etc.)
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Logging
    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
}
