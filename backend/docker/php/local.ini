; Custom PHP settings for the loyalty service container

[PHP]
; Increase upload/post limits for potential file uploads
upload_max_filesize = 40M
post_max_size = 40M

; Increase memory limit for queue jobs processing large datasets
memory_limit = 256M

; Execution time - queue worker overrides this via --timeout flag
max_execution_time = 300

; Timezone - set explicitly so date functions are consistent
date.timezone = Africa/Lagos
