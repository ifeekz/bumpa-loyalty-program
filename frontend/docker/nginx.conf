server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # SPA routing
    # All routes fall back to index.html so React Router handles navigation.
    # Without this, a hard refresh on /dashboard returns 404 from Nginx.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy
    # In production the frontend and backend are separate containers.
    # Nginx proxies /api/* to the backend service so Axios calls to /api
    # work without CORS — both origin and API share the same domain.
    #
    # BACKEND_HOST is set via docker-compose environment substitution.
    # Default: loyalty_app (the backend container service name).
    location /api/ {
        proxy_pass         http://loyalty_app:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
    }

    # Security headers
    add_header X-Content-Type-Options  "nosniff"                   always;
    add_header X-Frame-Options         "DENY"                      always;
    add_header X-XSS-Protection        "1; mode=block"             always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # Cache static assets
    # Vite fingerprints JS/CSS filenames with content hashes so these
    # can be cached aggressively. HTML is never cached — always fresh.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Block hidden files
    location ~ /\.(?!well-known).* {
        deny all;
    }

    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
}
